<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rezeptwerk | Registrierung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800;6..12,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Rezeptwerk Startseite">
        <span class="brand-mark">R</span>
        <span>Rezeptwerk</span>
      </a>
      <nav class="main-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="page-shell auth-shell">
      <section class="page-intro">
        <p class="eyebrow">Konto</p>
        <h1>Registrierung</h1>
      </section>

      <section class="auth-layout single">
        <form class="auth-form" id="signupForm">
          <div class="panel-heading">
            <p class="eyebrow">Registrieren</p>
            <h2>Neues Konto</h2>
          </div>
          <label>
            Name
            <input name="name" autocomplete="name" required>
          </label>
          <label>
            E-Mail
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Passwort
            <input name="password" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <button class="button primary" type="submit">Registrieren</button>
          <p class="auth-switch">Du hast schon ein Konto? <a href="auth.html">Zur Anmeldung</a></p>
        </form>
      </section>
      <p class="form-message" id="authMessage" role="status"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
