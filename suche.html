<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rezeptwerk | Rezeptsuche</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800;6..12,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Rezeptwerk Startseite">
        <span class="brand-mark">R</span>
        <span>Rezeptwerk</span>
      </a>
      <nav class="main-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="page-shell">
      <section class="page-intro">
        <p class="eyebrow">Rezeptsuche</p>
        <h1>Finde dein nächstes Lieblingsrezept.</h1>
      </section>

      <section class="search-layout">
        <aside class="filters search-panel" aria-label="Suchfilter">
          <label class="search-field">
            Suche
            <input id="searchInput" type="search" placeholder="Zutat, Gericht, Stimmung">
          </label>

          <div class="filter-group">
            <span>Tags</span>
            <div class="filter-chips" id="categoryFilter" aria-label="Kategorie wählen"></div>
          </div>

          <div class="filter-group">
            <span>Zeit</span>
            <div class="filter-chips compact" id="timeFilter" aria-label="Maximale Zeit wählen">
              <button class="filter-chip active" data-time-filter="999" type="button">Egal</button>
              <button class="filter-chip" data-time-filter="20" type="button">bis 20 Min.</button>
              <button class="filter-chip" data-time-filter="35" type="button">bis 35 Min.</button>
              <button class="filter-chip" data-time-filter="60" type="button">bis 60 Min.</button>
            </div>
          </div>

          <div class="filter-group">
            <span>Schwierigkeit</span>
            <div class="filter-chips compact" id="difficultyFilter" aria-label="Schwierigkeit wählen">
              <button class="filter-chip active" data-difficulty-filter="alle" type="button">Alle</button>
              <button class="filter-chip icon-chip" data-difficulty-filter="1" type="button" aria-label="1 Stufe">
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
              </button>
              <button class="filter-chip icon-chip" data-difficulty-filter="2" type="button" aria-label="2 Stufen">
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
              </button>
              <button class="filter-chip icon-chip" data-difficulty-filter="3" type="button" aria-label="3 Stufen">
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
              </button>
              <button class="filter-chip icon-chip" data-difficulty-filter="4" type="button" aria-label="4 Stufen">
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
              </button>
              <button class="filter-chip icon-chip" data-difficulty-filter="5" type="button" aria-label="5 Stufen">
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
                <span class="material-symbols-outlined" aria-hidden="true">star</span>
              </button>
            </div>
          </div>
        </aside>

        <section>
          <div class="result-meta">
            <span id="resultCount">0 Rezepte</span>
            <button class="text-button" id="resetFilters" type="button">Filter zurücksetzen</button>
          </div>
          <div class="recipe-grid" id="recipeResults"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
